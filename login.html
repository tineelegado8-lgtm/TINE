<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gaming Login - Black + Glitch</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
/* ----------------- BODY AND BACKGROUND ----------------- */
body {
    margin: 0;
    padding: 0;
    font-family: 'Arial', sans-serif;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    flex-direction: column;
    background-color: #000;
    overflow: hidden;
    position: relative;
}

/* Glitch effect */
body::before, body::after {
    content: "";
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: repeating-linear-gradient(
        45deg,
        rgba(192,192,192,0.1),
        rgba(192,192,192,0.1) 4px,
        transparent 4px,
        transparent 8px
    );
    pointer-events: none;
    z-index: 0;
}

body::before { animation: glitch1 5s linear infinite; }
body::after { animation: glitch2 7s linear infinite; }

@keyframes glitch1 {
    0% { transform: translate(0,0); opacity:0.3;}
    25% { transform: translate(5px,2px); opacity:0.25;}
    50% { transform: translate(-5px,-2px); opacity:0.3;}
    75% { transform: translate(3px,-3px); opacity:0.28;}
    100% { transform: translate(0,0); opacity:0.3;}
}

@keyframes glitch2 {
    0% { transform: translate(0,0); opacity:0.2;}
    25% { transform: translate(-4px,3px); opacity:0.18;}
    50% { transform: translate(4px,-2px); opacity:0.22;}
    75% { transform: translate(-3px,2px); opacity:0.2;}
    100% { transform: translate(0,0); opacity:0.2;}
}

/* ----------------- LOGIN ICON AND TITLE ----------------- */
.login-header {
    text-align: center;
    margin-bottom: 30px;
    z-index: 1;
    position: relative;
}

.login-header img {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    border: 4px solid red;
    box-shadow: 0 0 45px red, 0 0 90px darkred;
    margin-bottom: 20px;
    transition: transform 0.3s;
}

.login-header img:hover { transform: scale(1.1); }

.login-header h1 {
    font-size: 50px;
    color: red;
    text-shadow: 0 0 20px red, 0 0 40px darkred;
    margin: 0;
}

/* ----------------- FORM ----------------- */
form {
    background-color: rgba(17,17,17,0.95);
    padding: 60px 40px;
    border-radius: 15px;
    box-shadow: 0 0 50px red, 0 0 90px darkred;
    width: 400px;
    max-width: 90%;
    text-align: center;
    transition: transform 0.3s, box-shadow 0.3s;
    position: relative;
    z-index: 1;
}

form:hover { transform: scale(1.05); }

.input-group { position: relative; margin: 25px 0; }

.input-group i {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: red;
    font-size: 20px;
}

input[type="text"], input[type="password"] {
    width: 100%;
    padding: 14px 12px 14px 45px;
    border: 1px solid #333;
    border-radius: 6px;
    outline: none;
    background-color: #222;
    color: white;
    font-size: 18px;
    transition: 0.3s;
}

input::placeholder { color: #aaa; }
input:focus { box-shadow: 0 0 18px red; border-color: red; }

.checkbox-container {
    margin: 20px 0;
    text-align: left;
    padding-left: 5px;
}

input[type="checkbox"] { margin-right: 8px; }

button {
    padding: 14px 32px;
    border-radius: 6px;
    border: none;
    background-color: red;
    color: white;
    font-weight: bold;
    cursor: pointer;
    margin: 12px 5px;
    font-size: 18px;
    transition: 0.3s;
}

button:hover { background-color: darkred; transform: scale(1.08); }

#error-message {
    color: red;
    margin-top: 15px;
    display: none;
    text-align: center;
    text-shadow: 0 0 5px red;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="login-header">
    <img src="LOGO.jpg" alt="User Icon">
    <h1>LOGIN</h1>
</div>

<form id="loginForm">
    <div class="input-group">
        <i class="fa fa-user"></i>
        <input type="text" id="username" name="username" placeholder="Enter username"/>
    </div>

    <div class="input-group">
        <i class="fa fa-lock"></i>
        <input type="password" id="password" name="password" placeholder="Enter password"/>
    </div>

    <div class="checkbox-container">
        <input type="checkbox" id="remember" name="remember"/>   
        <label for="remember">Remember me</label>
    </div>

    <button type="button" onclick="checkLogin()">Submit</button>
    <button type="button" onclick="clearForm()">Cancel</button>

    <p id="error-message">Wrong username or password!</p>
</form>

<script>
const correctUsername = "admin";
const correctPassword = "1234";

// Focus username on load
window.onload = function(){ 
    document.getElementById("username").focus(); 
}

// Enter navigation
document.getElementById("username").addEventListener("keypress", e => { 
    if(e.key==="Enter"){ 
        e.preventDefault(); 
        document.getElementById("password").focus(); 
    } 
});
document.getElementById("password").addEventListener("keypress", e => { 
    if(e.key==="Enter"){ 
        e.preventDefault(); 
        checkLogin(); 
    } 
});

function checkLogin(){
    const u = document.getElementById("username").value.trim();
    const p = document.getElementById("password").value.trim();
    const errorMsg = document.getElementById("error-message");

    if(u === correctUsername && p === correctPassword){ 
        errorMsg.style.display = "none";
        window.location.href="form.html";  // goes directly without alert
    } else { 
        errorMsg.style.display = "block"; 
    }
}

function clearForm(){
    document.getElementById("username").value="";
    document.getElementById("password").value="";
    document.getElementById("error-message").style.display="none";
    document.getElementById("username").focus();
}
</script>

</body>
</html>
